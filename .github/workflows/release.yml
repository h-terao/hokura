name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2

      - name: Compile for Linux x86_64
        run: deno compile --allow-read --allow-write --allow-env --allow-run --target x86_64-unknown-linux-gnu --output hokura-linux-x86_64 main.ts

      - name: Compile for Linux aarch64
        run: deno compile --allow-read --allow-write --allow-env --allow-run --target aarch64-unknown-linux-gnu --output hokura-linux-aarch64 main.ts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" hokura-linux-x86_64 hokura-linux-aarch64

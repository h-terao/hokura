name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2

      - name: Update version in deno.json
        run: |
          deno eval "
            const config = JSON.parse(await Deno.readTextFile('deno.json'));
            config.version = '${{ inputs.version }}';
            await Deno.writeTextFile('deno.json', JSON.stringify(config, null, 2) + '\n');
          "

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deno.json
          git commit -m "release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD "v${{ inputs.version }}"

      - name: Compile for Linux x86_64
        run: deno compile --allow-read --allow-write --allow-env --allow-run --target x86_64-unknown-linux-gnu --output hokura-linux-x86_64 main.ts

      - name: Compile for Linux aarch64
        run: deno compile --allow-read --allow-write --allow-env --allow-run --target aarch64-unknown-linux-gnu --output hokura-linux-aarch64 main.ts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ inputs.version }}" hokura-linux-x86_64 hokura-linux-aarch64 --generate-notes

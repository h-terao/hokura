name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Test
        run: deno test --allow-read --allow-write --allow-env --allow-run

      - name: Compile check
        run: deno compile --allow-read --allow-write --allow-env --allow-run --output hokura main.ts

      - name: Install check
        run: ./hokura --help
